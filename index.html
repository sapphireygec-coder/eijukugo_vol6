<head>

<title>英熟語 Flashcard Vol.6 — 前置詞・熟語89選</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;--accent:#3b82f6;--accent2:#60a5fa;--accent3:#1d4ed8;--ok:#22c55e;--ng:#ef4444;--warn:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#2d3748;--border2:#374151;--A:#3b82f6;--B:#22c55e;--C:#a855f7;--D:#f59e0b;--font:'Times New Roman','Noto Serif JP',Georgia,serif;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
.pbar{height:3px;background:var(--bg3);position:fixed;top:0;left:0;right:0;z-index:20}.pfill{height:100%;background:var(--accent);transition:width .35s ease}
#hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:3px;z-index:10}
.hl{display:flex;align-items:center;gap:10px}
.badge{background:var(--accent3);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:4px;letter-spacing:.5px;font-family:sans-serif}
.htitle{font-size:14px;font-weight:700;color:var(--text)}
.hr{display:flex;align-items:center;gap:18px}
.scbox{display:flex;gap:14px;align-items:center;font-size:13px;font-family:sans-serif}
.sc-ok{color:var(--ok);font-weight:700}.sc-ng{color:var(--ng);font-weight:700}.sc-lbl{color:var(--text3)}.sc-pos{color:var(--text2);font-weight:600}
.timer{font-size:14px;color:var(--text2);font-family:'Courier New',monospace;min-width:52px;text-align:right}
#tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 16px;overflow-x:auto}
.tab{padding:10px 15px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:.2s;white-space:nowrap;flex-shrink:0;font-family:sans-serif}
.tab.active.A{border-color:var(--A);color:var(--A)}.tab.active.B{border-color:var(--B);color:var(--B)}.tab.active.C{border-color:var(--C);color:var(--C)}.tab.active.D{border-color:var(--D);color:var(--D)}
#main{padding:20px 16px;max-width:720px;margin:0 auto}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.qnum-badge{font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;border:1px solid;font-family:sans-serif}
.qnum-badge.A{color:var(--A);border-color:var(--A);background:rgba(59,130,246,.1)}.qnum-badge.B{color:var(--B);border-color:var(--B);background:rgba(34,197,94,.1)}.qnum-badge.C{color:var(--C);border-color:var(--C);background:rgba(168,85,247,.1)}.qnum-badge.D{color:var(--D);border-color:var(--D);background:rgba(245,158,11,.1)}
.qtype-lbl{font-size:11px;color:var(--text3);font-family:sans-serif}
.qtext{font-size:17px;line-height:1.9;color:var(--text);white-space:pre-line;margin-bottom:2px}
.qtext-jp{font-size:16px;line-height:1.8;color:var(--text);font-weight:500;margin-bottom:6px}
.qtext-en{font-size:16px;line-height:2.1;color:var(--text2);font-style:italic}
.qtext-inst{font-size:13px;color:var(--text3);margin-top:6px;font-family:sans-serif;font-style:normal}
.qtext-guide{font-size:13px;color:var(--text3);margin-top:8px;padding:7px 10px;background:var(--bg3);border-radius:6px;border-left:3px solid var(--text3);font-family:sans-serif}
.blank{display:inline-block;min-width:100px;border-bottom:2px solid var(--accent);color:var(--accent2);font-weight:700;text-align:center;padding:0 8px;vertical-align:bottom;line-height:1.8;margin:0 2px}
.abtn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border2);color:var(--accent2);padding:5px 13px;border-radius:6px;font-size:12px;cursor:pointer;margin-top:10px;transition:.2s;font-family:sans-serif}
.abtn:hover{background:var(--bg3);border-color:var(--accent)}.abtn svg{width:13px;height:13px;fill:currentColor}
.choices{display:flex;flex-direction:column;gap:9px;margin-top:18px}
.cbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 15px;border-radius:9px;font-size:15px;text-align:left;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:11px;line-height:1.5;font-family:var(--font)}
.cbtn:hover:not(:disabled){background:var(--bg4);border-color:var(--accent)}.cbtn .lbl{font-size:11px;color:var(--text3);font-weight:700;min-width:20px;flex-shrink:0;font-family:sans-serif}
.cbtn.ok{background:rgba(34,197,94,.12);border-color:var(--ok);color:var(--ok)}.cbtn.ng{background:rgba(239,68,68,.12);border-color:var(--ng);color:var(--ng)}.cbtn:disabled{cursor:default}
.iarea{margin-top:16px}
.qtimer-wrap{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.qtimer-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.qtimer-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .9s linear}
.qtimer-bar.warn{background:var(--warn)}.qtimer-bar.danger{background:var(--ng)}
.qtimer-num{font-size:13px;font-weight:700;color:var(--text2);min-width:28px;text-align:right;font-family:'Courier New',monospace}
.qtimer-num.warn{color:var(--warn)}.qtimer-num.danger{color:var(--ng)}
.irow{display:flex;gap:9px;align-items:stretch}
.tinput{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:9px;font-size:15px;font-family:var(--font);outline:none;transition:.2s}
.tinput:focus{border-color:var(--accent);background:var(--bg4)}.tinput.ok{border-color:var(--ok);background:rgba(34,197,94,.08);color:var(--ok)}.tinput.ng{border-color:var(--ng);background:rgba(239,68,68,.08);color:var(--ng)}
.sbtn{background:var(--accent3);border:none;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;font-family:sans-serif}
.sbtn:hover{background:var(--accent)}.sbtn:disabled{opacity:.4;cursor:default}
.hbtn{background:none;border:none;color:var(--warn);font-size:12px;cursor:pointer;padding:5px 0;margin-top:4px;display:none;font-family:sans-serif}
.hbox{font-size:12px;color:var(--warn);margin-top:5px;padding:6px 10px;background:rgba(245,158,11,.08);border-radius:6px;border:1px solid rgba(245,158,11,.25);display:none;font-family:sans-serif}
.fb{border-radius:9px;padding:14px 16px;margin-top:14px;display:none;line-height:1.7}.fb.ok{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.25)}.fb.ng{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25)}
.fb-tabs{display:flex;margin-bottom:10px;border-bottom:1px solid var(--border2)}
.fbtab{padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:.15s;font-family:sans-serif}.fbtab.active{border-color:var(--accent2);color:var(--accent2)}
.fbc{display:none}.fbc.show{display:block}
.fb-ans-row{font-size:14px;margin-bottom:7px;font-family:sans-serif}.fb-ans{color:var(--accent2);font-weight:700;font-family:var(--font)}.fb-note{font-size:13px;color:var(--text2);line-height:1.75;font-family:sans-serif}.fb-jp{font-size:13px;color:var(--text);line-height:1.8;padding:8px 0;font-family:sans-serif}
.nxtbtn{display:none;width:100%;margin-top:14px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;text-align:right;font-family:sans-serif}.nxtbtn:hover{background:var(--bg4);border-color:var(--accent)}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:36px 24px;text-align:center}
.s-grade{font-size:42px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.s-comment{font-size:15px;margin-bottom:20px;font-family:sans-serif}
.sbig{font-size:68px;font-weight:700;color:var(--accent2);line-height:1}
.slbl{font-size:15px;color:var(--text2);margin-top:8px;margin-bottom:28px;font-family:sans-serif}
.ssecs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}.ssec{border-radius:9px;padding:15px;text-align:center}
.ssec.A{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3)}.ssec.B{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3)}.ssec.C{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3)}.ssec.D{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)}
.sn{font-size:11px;font-weight:700;line-height:1.4;font-family:sans-serif}.ssec.A .sn{color:var(--A)}.ssec.B .sn{color:var(--B)}.ssec.C .sn{color:var(--C)}.ssec.D .sn{color:var(--D)}
.sv{font-size:26px;font-weight:700;margin-top:5px}.ssec.A .sv{color:var(--A)}.ssec.B .sv{color:var(--B)}.ssec.C .sv{color:var(--C)}.ssec.D .sv{color:var(--D)}
.rbtn{width:100%;padding:13px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;margin-top:10px;transition:.2s;font-family:sans-serif}.rbtn.p{background:var(--accent3);color:#fff}.rbtn.p:hover{background:var(--accent)}.rbtn.s{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.rbtn.s:hover{background:var(--bg4)}
@media(max-width:480px){.qtext,.qtext-jp,.qtext-en{font-size:15px}.htitle{font-size:12px}.tab{padding:9px 11px;font-size:12px}.blank{min-width:76px}}</style>
</head>

const MP3={f1:'6-1.mp3',f2:'6-2.mp3',f3:'6-3.mp3',f4:'6-4.mp3',f5:'6-5.mp3',f6:'6-6.mp3',f7:'6-7.mp3',f8:'6-8.mp3',f9:'6-9.mp3'};
const POOL=[{"id": "A1", "sec": "A", "sent": 5, "q": "Many of Satoshi's friends attributed his success ____ his hard work and flexible thinking.", "opts": ["to", "for", "of", "with"], "a": "to", "n": "attribute A to B\u300cA\u3092B\u306e\u304a\u304b\u3052\u3068\u3059\u308b\u30fbA\u3092B\u306b\u5e30\u3059\u308b\u300d\u3002be attributed to B \u306e\u5f62\u3067\u3082\u983b\u51fa\u3002", "jp": "\u30b5\u30c8\u30b7\u306e\u53cb\u4eba\u306e\u591a\u304f\u306f\u3001\u5f7c\u306e\u6210\u529f\u3092\u52aa\u529b\u3068\u67d4\u8edf\u306a\u601d\u8003\u306e\u304a\u304b\u3052\u3060\u3068\u8003\u3048\u305f\u3002", "audio": {"file": "f6", "start": 1.0, "end": 5.646}}, {"id": "A2", "sec": "A", "sent": 7, "q": "The professor confined his lecture ____ how the problem had been handled so far.", "opts": ["to", "on", "in", "at"], "a": "to", "n": "confine A to B\u300cA\u3092B\u306b\u9650\u5b9a\u3059\u308b\u300d\u3002restrict A to B \u3068\u540c\u7fa9\u3002", "jp": "\u6559\u6388\u306f\u8b1b\u7fa9\u3092\u3053\u308c\u307e\u3067\u306e\u554f\u984c\u306e\u6271\u308f\u308c\u65b9\u306b\u9650\u5b9a\u3057\u305f\u3002", "audio": {"file": "f3", "start": 6.186, "end": 10.556}}, {"id": "A3", "sec": "A", "sent": 10, "q": "Many parents forbid their children ____ using their smartphones for a certain number of hours a day.", "opts": ["from", "of", "to", "in"], "a": "from", "n": "forbid A from doing\u300cA\u304cB\u3059\u308b\u3053\u3068\u3092\u7981\u3058\u308b\u300d\u3002prohibit A from doing \u3068\u540c\u7fa9\u3002", "jp": "\u591a\u304f\u306e\u89aa\u306f\u5b50\u3069\u3082\u304c1\u65e5\u4e00\u5b9a\u6642\u9593\u30b9\u30de\u30fc\u30c8\u30d5\u30a9\u30f3\u3092\u4f7f\u7528\u3059\u308b\u3053\u3068\u3092\u7981\u3058\u3066\u3044\u308b\u3002", "audio": {"file": "f6", "start": 6.746, "end": 12.301}}, {"id": "A4", "sec": "A", "sent": 13, "q": "We can substitute a group of easier words ____ one difficult word whenever necessary.", "opts": ["for", "to", "with", "of"], "a": "for", "n": "substitute A for B\u300cA\u3092B\u306e const GRADES=[
  {min:20,max:20,emoji:'\ud83c\udfc6',grade:'Perfect!',color:'#f59e0b',comment:'\u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\uff01'},
  {min:18,max:19,emoji:'\ud83c\udf1f',grade:'Excellent!',color:'#22c55e',comment:'\u305d\u306e\u8abf\u5b50\u3067\u3053\u308c\u304b\u3089\u3082\uff01'},
  {min:15,max:17,emoji:'\ud83d\udc4f',grade:'Very Good!',color:'#3b82f6',comment:'\u3088\u304f\u3067\u304d\u307e\u3057\u305f\uff01\u3082\u3046\u5c11\u3057\u3002'},
  {min:12,max:14,emoji:'\ud83d\udcaa',grade:'Good!',color:'#60a5fa',comment:'\u826f\u3044\u3067\u3059\uff01\u5f15\u304d\u7d9a\u304d\u7df4\u7fd2\u3002'},
  {min:9,max:11,emoji:'\ud83d\udcda',grade:'Keep Going!',color:'#a855f7',comment:'\u3082\u3046\u4e00\u606f\uff01\u7e70\u308a\u8fd4\u3057\u3067\u4e0a\u9054\u3002'},
  {min:0,max:8,emoji:'\ud83d\udca1',grade:'Try Again!',color:'#ef4444',comment:'\u3053\u308c\u304b\u3089\uff01\u9813\u5f35\u308a\u307e\u3057\u3087\u3046\u3002'},
];
function getGrade(n){return GRADES.find(g=>n>=g.min&&n<=g.max)||GRADES[GRADES.length-1];}
const ST={qs:[],cur:0,done:false,sc:{A:0,B:0,C:0,D:0},ok:0,ng:0,t0:Date.now()};
let _qtimer=null,_qsec=30;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
let _ae={};
function getAud(k){if(!_ae[k])_ae[k]=new Audio(MP3[k]);return _ae[k];}
let _ca=null,_ct=null;
function playClip(f,s,e){
  if(_ca){_ca.pause();if(_ct){clearTimeout(_ct);_ct=null;}}
  const a=getAud(f);if(!a)return;
  a.currentTime=s;a.play();_ca=a;
  const dur=Math.max(0,(e-s)*1000-50);
  _ct=setTimeout(()=>{a.pause();_ca=null;_ct=null;},dur);
}
function init(){
  const p={};['A','B','C','D'].forEach(s=>p[s]=shuffle(POOL.filter(q=>q.sec===s)).slice(0,5));
  ST.qs=shuffle([...p.A,...p.B,...p.C,...p.D]);
  ST.cur=0;ST.done=false;ST.sc={A:0,B:0,C:0,D:0};ST.ok=0;ST.ng=0;ST.t0=Date.now();
  document.getElementById('pf').style.width='0%';updateHdr();render();
}
function updateHdr(){
  const q=ST.qs[ST.cur];
  ['A','B','C','D'].forEach(s=>{const t=document.getElementById('tab-'+s);t.className='tab '+s+(q&&q.sec===s?' active':'');});
  document.getElementById('sc-ok').textContent=ST.ok;document.getElementById('sc-ng').textContent=ST.ng;
  document.getElementById('sc-pos').textContent=(ST.cur<20?ST.cur+1:20)+'/20\u554f';
  document.getElementById('pf').style.width=(Math.min(ST.cur,20)/20*100)+'%';
}
function startQTimer(q){
  stopQTimer();if(q.sec==='A')return;
  _qsec=30;updateQTimerUI(30);
  _qtimer=setInterval(()=>{_qsec--;updateQTimerUI(_qsec);if(_qsec<=0){stopQTimer();if(!ST.done){ST.done=true;ST.ng++;const q2=ST.qs[ST.cur];const i=document.getElementById('ai');if(i){i.disabled=true;i.classList.add('ng');}const sb=document.getElementById('sb');if(sb)sb.disabled=true;showFB(false,q2,true);}}},1000);
}
function stopQTimer(){clearInterval(_qtimer);_qtimer=null;}
function updateQTimerUI(sec){
  const bar=document.getElementById('qtbar'),num=document.getElementById('qtnum');if(!bar||!num)return;
  bar.style.width=(sec/30*100)+'%';num.textContent=sec+'s';
  const c=sec<=5?'danger':sec<=10?'warn':'';
  bar.className='qtimer-bar'+(c?' '+c:'');num.className='qtimer-num'+(c?' '+c:'');
}
const STYPE={A:'4\u62e9 | \u524d\u7f6e\u8a5e\u30fb\u718a\u8a9e\u9078\u629e',B:'\u524d\u7f6e\u8a5e | \u9023\u8a9e\u88dc\u5145',C:'\u718a\u8a9e | \u9069\u8a9e\u88dc\u5145',D:'\u718a\u8a9e | \u548c\u2192\u82f1'};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eA(s){return String(s).replace(/'/g,'&#39;');}
function bfy(s){return esc(s).replace(/____/g,'<span class="blank">\u2003\u2003\u2003\u2003\u2003\u2003</span>').replace(/___/g,'<span class="blank">\u2003\u2003\u2003\u2003</span>');}
function render(){
  if(ST.cur>=20){stopQTimer();renderResult();return;}
  const q=ST.qs[ST.cur];ST.done=false;updateHdr();
  const au=q.audio;
  const abtn=`<button class="abtn" onclick="playClip('${au.file}',${au.start},${au.end})"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>\u25b6 \u4f8b\u6587\u3092\u8074\u304f</button>`;
  let qtxt='';
  if(q.sec==='D'){
    const SEP='\n\u2192 ';const idx=q.q.indexOf(SEP);
    const jpP=idx>=0?q.q.substring(0,idx):q.q;
    const enP=idx>=0?q.q.substring(idx+SEP.length):'';
    qtxt=`<div class="qtext-jp">${esc(jpP)}</div><div class="qtext-en">\u2192 ${bfy(enP)}</div>`;
  } else if(q.sec==='C'){
    const lines=q.q.split('\n');
    const instLine=lines[lines.length-1];
    const bodyLines=lines.slice(0,-1);
    const jpLine=bodyLines[0];
    const enLines=bodyLines.slice(1);
    qtxt=`<div class="qtext-jp">${esc(jpLine)}</div>`+
         `<div class="qtext-en">${enLines.map(l=>bfy(l)).join('<br>')}</div>`+
         `<div class="qtext-inst">${esc(instLine)}</div>`;
  } else {
    qtxt=`<div class="qtext">${bfy(q.q)}</div>`;
  }
  const guide=(q.sec==='B')?`<div class="qtext-guide">\ud83d\udcdd ${esc(q.jp)}</div>`:'';
  const timerBar=(q.sec!=='A')?`<div class="qtimer-wrap"><div class="qtimer-bar-bg"><div class="qtimer-bar" id="qtbar" style="width:100%"></div></div><div class="qtimer-num" id="qtnum">30s</div></div>`:'';
  let inp='';
  if(q.sec==='A'){
    const opts=shuffle([...q.opts]);
    inp=`<div class="choices">${opts.map((o,i)=>`<button class="cbtn" onclick="pick(this,'${eA(o)}')" data-v="${eA(o)}"><span class="lbl">${['\u2460','\u2461','\u2462','\u2463'][i]}</span>${esc(o)}</button>`).join('')}</div>`;
  } else {
    const hp=(q.hint&&q.hint.trim())?`<button class="hbtn" id="hbtn" onclick="showHint()">\ud83d\udca1 \u30d2\u30f3\u30c8\u3092\u898b\u308b</button><div class="hbox" id="hbox">\u30d2\u30f3\u30c8: ${esc(q.hint)}</div>`:'';
    inp=`<div class="iarea">${timerBar}<div class="irow"><input class="tinput" id="ai" placeholder="\u7b54\u3048\u3092\u5165\u529b\u2026" onkeydown="if(event.key==='Enter')sub()"><button class="sbtn" id="sb" onclick="sub()">\u78ba\u8a8d</button></div>${hp}</div>`;
  }
  document.getElementById('main').innerHTML=`<div class="qcard"><div class="qmeta"><span class="qnum-badge ${q.sec}">Q${ST.cur+1}/20</span><span class="qtype-lbl">${STYPE[q.sec]}</span></div>${qtxt}${guide}${abtn}${inp}<div class="fb" id="fb"></div><button class="nxtbtn" id="nb" onclick="nxt()">\u6b21\u306e\u554f\u984c \u2192</button></div>`;
  if(q.sec!=='A'){
    const i=document.getElementById('ai');if(i)setTimeout(()=>i.focus(),80);
    if(q.hint&&q.hint.trim()){const h=document.getElementById('hbtn');if(h)h.style.display='block';}
    setTimeout(()=>startQTimer(q),100);
  }
}
function showHint(){const b=document.getElementById('hbtn'),h=document.getElementById('hbox');if(b)b.style.display='none';if(h)h.style.display='block';}
function pick(btn,sel){
  if(ST.done)return;ST.done=true;const q=ST.qs[ST.cur];
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.dataset.v===q.a)b.classList.add('ok');});
  const ok=(sel===q.a);btn.classList.remove('ok');btn.classList.add(ok?'ok':'ng');
  if(ok){ST.sc[q.sec]++;ST.ok++;}else ST.ng++;showFB(ok,q);
}
function norm(s){return s.trim().toLowerCase().replace(/[\u3000\s]+/g,' ').replace(/[\uff01-\uff5e]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[.,!?\u3002\u3001\u2026\/]/g,'').trim();}
function checkAns(input,q){const ni=norm(input);if(ni===norm(q.a))return true;if(q.alts&&q.alts.length&&q.alts.some(alt=>norm(alt)===ni))return true;return false;}
function sub(){if(ST.done)return;const i=document.getElementById('ai');if(!i||!i.value.trim())return;stopQTimer();ST.done=true;const q=ST.qs[ST.cur];const ok=checkAns(i.value,q);i.disabled=true;i.classList.add(ok?'ok':'ng');const sb=document.getElementById('sb');if(sb)sb.disabled=true;if(ok){ST.sc[q.sec]++;ST.ok++;}else ST.ng++;showFB(ok,q);}
function showFB(ok,q,timeout=false){
  if(ok)playClip(q.audio.file,q.audio.start,q.audio.end);
  const fb=document.getElementById('fb');fb.className='fb '+(ok?'ok':'ng');fb.style.display='block';
  const mk=ok?'\u2713 \u6b63\u89e3':(timeout?'\u23f0 \u6642\u9593\u5207\u308c':'\u2717 \u4e0d\u6b63\u89e3');
  const ansDisp=q.alts&&q.alts.length?[q.a,...q.alts].join(' / '):q.a;
  fb.innerHTML=`<div class="fb-tabs"><div class="fbtab active" id="ft-ans" onclick="fbTab('ans')">\u6b63\u89e3\u3068\u89e3\u8aac</div><div class="fbtab" id="ft-jp" onclick="fbTab('jp')">\u4f8b\u6587\u30fb\u65e5\u672c\u8a9e\u8a33</div></div><div class="fbc show" id="fc-ans"><div class="fb-ans-row">${mk}\u3000\u6b63\u89e3\uff1a<span class="fb-ans">${esc(ansDisp)}</span></div><div class="fb-note">${esc(q.n)}</div></div><div class="fbc" id="fc-jp"><div class="fb-jp">${esc(q.jp)}</div></div>`;
  document.getElementById('nb').style.display='block';
  document.getElementById('sc-ok').textContent=ST.ok;document.getElementById('sc-ng').textContent=ST.ng;
}
function fbTab(t){['ans','jp'].forEach(x=>{document.getElementById('ft-'+x).classList.toggle('active',x===t);document.getElementById('fc-'+x).classList.toggle('show',x===t);});}
function nxt(){stopQTimer();ST.cur++;ST.done=false;render();}
function renderResult(){
  document.getElementById('pf').style.width='100%';document.getElementById('sc-pos').textContent='\u5b8c\u4e86\uff01';
  const e=Math.floor((Date.now()-ST.t0)/1000),mm=String(Math.floor(e/60)).padStart(2,'0'),ss=String(e%60).padStart(2,'0');
  const g=getGrade(ST.ok);
  document.getElementById('main').innerHTML=
    `<div class="scard"><div class="s-grade" style="color:${g.color}">${g.emoji} ${g.grade}</div>`+
    `<div class="s-comment" style="color:${g.color}">${g.comment}</div>`+
    `<div class="sbig">${ST.ok}</div><div class="slbl">/ 20\u554f\u6b63\u89e3 &nbsp;\u23f1 ${mm}:${ss}</div>`+
    `<div class="ssecs">`+
    `<div class="ssec A"><div class="sn">Section A<br>4\u62e9</div><div class="sv">${ST.sc.A}/5</div></div>`+
    `<div class="ssec B"><div class="sn">Section B<br>\u9023\u8a9e\u88dc\u5145</div><div class="sv">${ST.sc.B}/5</div></div>`+
    `<div class="ssec C"><div class="sn">Section C<br>\u9069\u8a9e\u88dc\u5145</div><div class="sv">${ST.sc.C}/5</div></div>`+
    `<div class="ssec D"><div class="sn">Section D<br>\u548c\u2192\u82f1</div><div class="sv">${ST.sc.D}/5</div></div>`+
    `</div>`+
    `<button class="rbtn p" onclick="init()">\ud83d\udd00 \u5225\u306e20\u554f\u306b\u6311\u6226</button>`+
    `<button class="rbtn s" onclick="init()">\u3082\u3046\u4e00\u5ea6</button></div>`;
}
setInterval(()=>{if(ST.cur<20){const e=Math.floor((Date.now()-ST.t0)/1000);document.getElementById('tmr').textContent=Math.floor(e/60)+':'+(e%60<10?'0':'')+(e%60);}},1000);
init();
</script>
</body>
